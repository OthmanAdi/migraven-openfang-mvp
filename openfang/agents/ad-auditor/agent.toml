name = "ad-auditor"
version = "0.1.0"
description = "migRaven AD Auditor — IT-Security-Consultant Agent fuer Active Directory, Berechtigung und Security Audit ueber Neo4j."
author = "migRaven"
module = "builtin:chat"

tags = ["active-directory", "berechtigung", "security-audit", "neo4j", "ownership"]
max_history_messages = 60

[model]
provider = "openai"
model = "gpt-5.5"
api_key_env = "AZURE_FOUNDRY_KEY"
base_url = "https://YOUR-FOUNDRY.cognitiveservices.azure.com/openai/v1"
max_tokens = 16384
temperature = 0.3
system_prompt_file = "SYSTEM_PROMPT.md"

[[fallback_models]]
provider = "openai"
model = "claude-opus-4-5"
api_key_env = "AZURE_FOUNDRY_KEY"
base_url = "https://YOUR-FOUNDRY.cognitiveservices.azure.com/openai/v1"
max_tokens = 8192
temperature = 0.3

[resources]
max_llm_tokens_per_hour = 1500000
max_concurrent_tools = 5

[capabilities]
tools = [
  "execute_cypher",
  "batch_queries",
  "search_fulltext",
  "count_matching_objects",
  "enumerate_rule_matches",
  "get_ownership_coverage",
  "save_ownership_rule",
  "assign_owner_to_rule",
  "propose_ownership_clusters",
  "audit_security",
  "update_todos",
]
network = ["127.0.0.1:7687", "localhost:7687", "*.cognitiveservices.azure.com:443"]
memory_read = ["self.*"]
memory_write = ["self.*"]
agent_spawn = false
shell = []

skills = ["migraven-ad"]
